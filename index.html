<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Web Terminal</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: monospace;
            padding: 1rem;
        }

        #terminal {
            white-space: pre-wrap;
            line-height: 1.2;
            word-break: break-all;
        }

        #inputRow {
            font-family: monospace;
            color: white;
            background: black;
            word-break: break-all;
            line-height: 1.2;
        }

        #workingDir {
            display: inline;
            white-space: nowrap;
            /* keeps the prompt from ever breaking */
        }

        #input {
            display: inline;
            background: black;
            color: white;
            font-family: monospace;
            outline: none;
            white-space: pre-wrap;
            word-break: break-all;
            caret-color: white;
            min-width: 1ch;
        }

        .hideMe {
            display: none;
        }

        #writeEditor {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: monospace;
            z-index: 999;
        }

        #writeHeader,
        #writeFooter {
            background: #333;
            color: #fff;
            padding: 4px 8px;
            font-size: 0.85rem;
        }

        #writeArea {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            outline: none;
            padding: 8px;
            font-family: monospace;
            font-size: 1rem;
            resize: none;
            tab-size: 4;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="terminal"></div>
        <div id="inputRow">
            <span id="workingDir">nelsonkids@Nelsons-Mac-mini ~ $</span>
            <span id="input" contenteditable="true" spellcheck="false"></span>
        </div>
    </div>
    <script type="module" src="./app.ts"></script>
</body>

</html>
